<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <form method="post" enctype="multipart/form-data"
          style="background-color: white; padding: 30px; border-radius: 10px; width: 350px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1);">

        {% csrf_token %}

        <h2 style="text-align: center; color: #333;">Login</h2>

        {% if messages %}
            {% for message in messages %}
                <p style="color: red; text-align: center;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <label style="font-weight: bold;">Username</label><br>
        <input type="text" name="username"
               style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">

        <label style="font-weight: bold;">Password</label><br>
        <input type="password" name="password"
               style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">

        <p style="text-align: center;">
            Don't have an account?
            <a href="register_page" style="color: #007bff; text-decoration: none;">
                Register
            </a>
        </p>

        <button type="submit"
                style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
            Login
        </button>

    </form>

</body>
</html>
